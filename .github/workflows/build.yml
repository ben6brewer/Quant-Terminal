name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: QuantTerminal-macOS
          - os: windows-latest
            artifact: QuantTerminal-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pyinstaller>=6.0"

      - name: Install pywin32 (Windows only)
        if: runner.os == 'Windows'
        run: pip install "pywin32>=306"

      - name: Build with PyInstaller
        run: pyinstaller quant_terminal.spec --noconfirm

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "Quant Terminal" \
            -srcfolder "dist/Quant Terminal.app" \
            -ov -format UDZO \
            "dist/QuantTerminal-macOS.dmg"

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/QuantTerminal-macOS.dmg

      - name: Upload Windows build
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/QuantTerminal/
